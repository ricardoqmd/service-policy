# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Service Policy local development stack
# ─────────────────────────────────────────────────────────────────────────────
# Spins up everything needed to run Service Policy locally:
#   - service-policy : the application itself (Quarkus on JVM)
#   - mongodb        : MongoDB 7 (standalone) for policy storage
#   - mongo-express  : web UI to inspect MongoDB
#
# Activation is a single-document update on the policy head (ADR-016), so NO
# replica set is required — plain standalone Mongo is enough. (Running a replica
# set for other reasons, e.g. HA, is an independent operational choice.)
#
# LOCAL-ONLY SIMPLIFICATION: this stack runs Mongo WITHOUT access control (no
# root user). Do NOT copy this no-auth setup to any shared/remote environment.
#
# Usage:
#   Build & run everything:   docker compose up --build
#   Run in background:        docker compose up -d
#   Stop:                     docker compose down
#   Stop & wipe DB:           docker compose down -v
#   View logs:                docker compose logs -f service-policy
#
# Before first run: build the JVM jar so the Dockerfile has something to copy:
#   ./mvnw clean package -DskipTests
#
# Access points (use ports from your .env if customized):
#   Service Policy:  http://localhost:${SERVICE_POLICY_HOST_PORT:-8080}
#   Swagger UI:      http://localhost:${SERVICE_POLICY_HOST_PORT:-8080}/q/swagger-ui
#   Health:          http://localhost:${SERVICE_POLICY_HOST_PORT:-8080}/q/health
#   Metrics:         http://localhost:${SERVICE_POLICY_HOST_PORT:-8080}/q/metrics
#   Mongo Express:   http://localhost:${MONGO_EXPRESS_HOST_PORT:-8081}
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ──────────────────────────────────────────────────────────────────────────
  # Service Policy application
  # ──────────────────────────────────────────────────────────────────────────
  service-policy:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    image: service-policy:local
    container_name: service-policy
    restart: unless-stopped
    ports:
      # HOST:CONTAINER — only the host side is configurable.
      - "${SERVICE_POLICY_HOST_PORT:-8080}:8080"
    environment:
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-dev}

      # Plain standalone Mongo on the compose network (no replica set needed).
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongodb:27017
      QUARKUS_MONGODB_DATABASE: service_policy

      JAVA_OPTS_APPEND: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - service-policy-net

  # ──────────────────────────────────────────────────────────────────────────
  # MongoDB — standalone, no auth (local only)
  # ──────────────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: service-policy-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_DB_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - service-policy-net

  # ──────────────────────────────────────────────────────────────────────────
  # Mongo Express — web UI for browsing MongoDB (dev only)
  # ──────────────────────────────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: service-policy-mongo-express
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_HOST_PORT:-8081}:8081"
    environment:
      # No Mongo credentials (access control is off locally).
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      # Basic auth for the Express web UI itself (not for Mongo).
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-admin}
      ME_CONFIG_SITE_BASEURL: /
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - service-policy-net

# ─────────────────────────────────────────────────────────────────────────────
# Named volumes: data persists across container recreations.
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mongodb-data:
    name: service-policy-mongodb-data
  mongodb-config:
    name: service-policy-mongodb-config

# ─────────────────────────────────────────────────────────────────────────────
# Isolated network: services talk to each other by name (e.g. 'mongodb').
# ─────────────────────────────────────────────────────────────────────────────
networks:
  service-policy-net:
    name: service-policy-net
    driver: bridge