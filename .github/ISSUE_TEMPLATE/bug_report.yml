name: Bug report
description: Report a bug to help us improve Service Policy
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        If this is a **security vulnerability**, please do **not** open a public issue.
        Use [GitHub Security Advisories](https://github.com/ricardoqmd/service-policy/security/advisories/new) instead.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe what actually happened.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: A clear and concise description of the expected behavior.
      placeholder: Describe what you expected.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reliably reproduce the issue.
      placeholder: |
        1. Start the service with ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Service Policy version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      options:
        - JVM (./mvnw quarkus:dev or quarkus-run.jar)
        - Native (GraalVM native executable)
        - Docker JVM
        - Docker Native
        - Other
    validations:
      required: true

  - type: input
    id: java_version
    attributes:
      label: Java version
      placeholder: "e.g. 21.0.3"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 14 ARM, Ubuntu 22.04 x86_64"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output. This will be formatted as shell output automatically.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to the [Code of Conduct](https://github.com/ricardoqmd/service-policy/blob/main/CODE_OF_CONDUCT.md).
          required: true
