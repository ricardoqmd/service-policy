name: Feature request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to Service Policy!
        Before submitting, please check the [Roadmap](https://github.com/ricardoqmd/service-policy#roadmap)
        to see if your idea is already planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or limitation you are running into.
      placeholder: "I'm trying to do X, but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you would like to see.
      placeholder: "It would be helpful if..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative solutions have you tried?
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority for you
      options:
        - Nice to have
        - Important
        - Blocker
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or examples that would help.
    validations:
      required: false

  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I have read and agree to the [Code of Conduct](https://github.com/ricardoqmd/service-policy/blob/main/CODE_OF_CONDUCT.md).
          required: true
