# ─────────────────────────────────────────────────────────────
# Service Policy · base configuration
# ─────────────────────────────────────────────────────────────
# 12-factor principle: all sensitive config comes from env vars.
# This file holds reasonable defaults for local development.
# In production, env vars override these values
# (Docker, Kubernetes, systemd, etc.).

quarkus:
  application:
    name: service-policy
    version: 0.1.0-SNAPSHOT

  # ─── HTTP server ───────────────────────────────────────────
  http:
    port: 8080
    # Response compression (gzip) for JSON payloads.
    enable-compression: true

  # ─── OIDC: bearer-only resource server (ADR-013) ───────────
  # Override via env vars: QUARKUS_OIDC_AUTH_SERVER_URL, QUARKUS_OIDC_TOKEN_AUDIENCE.
  # /q/health and /info are public (no @Authenticated on those resources).
  oidc:
    auth-server-url: ${QUARKUS_OIDC_AUTH_SERVER_URL:https://auth.example.com/realms/default}
    application-type: service
    token:
      audience: ${QUARKUS_OIDC_TOKEN_AUDIENCE:service-policy}
    roles:
      # Keycloak default; override for other IdPs (e.g. Auth0 sets roles in a different claim).
      role-claim-path: realm_access/roles

  # MongoDB — Dev Services starts a throwaway MongoDB for dev/test (Docker required).
  mongodb:
    database: service_policy

  # ─── Logging ───────────────────────────────────────────────
  # Default: JSON structured logs to stdout (12-factor compliant).
  # Overridden in %dev profile to be human-readable.
  log:
    level: INFO
    category:
      "io.github.ricardoqmd.servicepolicy":
        level: DEBUG
    console:
      json:
        pretty-print: false
        date-format: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"

  # ─── Health checks ─────────────────────────────────────────
  # Quarkus automatically exposes:
  #   GET /q/health         → liveness + readiness combined
  #   GET /q/health/live    → liveness  (am I alive?)
  #   GET /q/health/ready   → readiness (can I receive traffic?)
  smallrye-health:
    root-path: /q/health

  # ─── Metrics ───────────────────────────────────────────────
  # Prometheus-format metrics exposed at /q/metrics.
  micrometer:
    export:
      prometheus:
        path: /q/metrics
    binder:
      http-server:
        enabled: true
      http-client:
        enabled: true
      jvm: true
      system: true

  # ─── OpenAPI / Swagger UI ──────────────────────────────────
  swagger-ui:
    always-include: true
    path: /q/swagger-ui
  smallrye-openapi:
    path: /q/openapi
    info-title: "Service Policy — PDP"
    info-version: "1.0.0"
    store-schema-directory: docs

# ─────────────────────────────────────────────────────────────
# Service Policy custom configuration (typed via ServicePolicyConfig)
# ─────────────────────────────────────────────────────────────
service-policy:
  info:
    name: "Service Policy"
    description: "Open source ABAC Policy Decision Point"
    repository: "https://github.com/ricardoqmd/service-policy"
  # Authorization markers (ADR-013). mode: role | scope.
  # Override role/scope names via env vars, e.g. SERVICE_POLICY_AUTHZ_ADMIN_ROLE=my-admin.
  authz:
    admin:
      mode: role
      role: authz-admin
    delegation:
      mode: role
      role: pdp-client

# ═════════════════════════════════════════════════════════════
# Profile: dev  (active when running `./mvnw quarkus:dev`)
# ═════════════════════════════════════════════════════════════
"%dev":
  quarkus:
    oidc:
      # Disabled by default in dev; set QUARKUS_OIDC_ENABLED=true and
      # QUARKUS_OIDC_AUTH_SERVER_URL=<your-idp> to enable OIDC locally.
      enabled: false
    log:
      level: DEBUG
      # Human-readable plain-text logs in dev (override JSON default).
      console:
        format: "%d{HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %s%e%n"

# ═════════════════════════════════════════════════════════════
# Profile: test  (active during `./mvnw test`)
# ═════════════════════════════════════════════════════════════
"%test":
  quarkus:
    oidc:
      # Disabled in tests: @TestSecurity from quarkus-test-security supplies the
      # security identity and JWT claims without a real OIDC server.
      enabled: false
    log:
      level: WARN
      category:
        "io.github.ricardoqmd.servicepolicy":
          level: INFO
      console:
        format: "%d{HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %s%e%n"

# ═════════════════════════════════════════════════════════════
# Profile: prod  (default when running the packaged jar)
# ═════════════════════════════════════════════════════════════
"%prod":
  quarkus:
    log:
      level: INFO
    # Swagger UI disabled in production for security
    # (prevents attackers from probing endpoint schemas).
    swagger-ui:
      always-include: false
