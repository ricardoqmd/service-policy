# ─────────────────────────────────────────────────────────────
# Service Policy · base configuration
# ─────────────────────────────────────────────────────────────
# 12-factor principle: all sensitive config comes from env vars.
# This file holds reasonable defaults for local development.
# In production, env vars override these values
# (Docker, Kubernetes, systemd, etc.).

quarkus:
  application:
    name: service-policy
    version: 0.1.0-SNAPSHOT

  # ─── JSON bodies ───────────────────────────────────────────
  # Strict request bodies: an unknown field is a client error, not something to ignore.
  # This is what makes "'app' must not be present in the body" enforceable (ADR-026) —
  # 'app' was removed from the request records, so silently ignoring it would accept a body
  # that contradicts the path. UnknownPropertyMapper turns the failure into 400 problem+json.
  jackson:
    fail-on-unknown-properties: true

  # ─── HTTP server ───────────────────────────────────────────
  http:
    port: 8080
    # Response compression (gzip) for JSON payloads.
    enable-compression: true

  # ─── OIDC: bearer-only resource server (ADR-013) ───────────
  # The PDP validates signed JWTs against the realm's JWKS. As a bearer-only
  # resource server it needs NO client secret (that would be the PEP's concern).
  # Override via env vars (see .env.example): QUARKUS_OIDC_AUTH_SERVER_URL,
  # QUARKUS_OIDC_CLIENT_ID, QUARKUS_OIDC_TOKEN_AUDIENCE.
  # /q/health and /info stay public (no @Authenticated on those resources).
  #
  # Keycloak 26 notes:
  #   - auth-server-url is the REALM url: https://<kc-host>/realms/<realm>
  #   - TLS: if Keycloak runs behind a private/internal CA, the JVM/container must
  #     trust that CA. Prefer trusting the CA at the JVM/container truststore level
  #     over per-app TLS config — boring and consistent across services.
  oidc:
    auth-server-url: ${QUARKUS_OIDC_AUTH_SERVER_URL:https://auth.example.com/realms/default}
    client-id: ${QUARKUS_OIDC_CLIENT_ID:service-policy}
    application-type: service
    token:
      # Audience check: rejects tokens not minted for this PDP.
      # ⚠ Keycloak does NOT put the resource-server's client-id in `aud` by
      # default — add an "Audience" protocol mapper on the client (or the token
      # won't contain it and EVERY request will 401). If you hit blanket 401s
      # right after enabling OIDC, this mapper is the usual culprit.
      audience: ${QUARKUS_OIDC_TOKEN_AUDIENCE:service-policy}
    roles:
      # Keycloak realm roles live here. If `authz-admin` is a CLIENT role instead
      # of a realm role, use: resource_access/${QUARKUS_OIDC_CLIENT_ID}/roles
      role-claim-path: realm_access/roles

  # ─── MongoDB ───────────────────────────────────────────────
  # Standalone Mongo is enough: activation is a single-document update on the
  # policy head (ADR-016), so no replica set / transactions are required.
  # NO connection-string here on purpose:
  #   - dev/test: absence → Quarkus Dev Services starts a throwaway MongoDB.
  #   - deploy:   QUARKUS_MONGODB_CONNECTION_STRING is injected by the environment
  #     and binds to quarkus.mongodb.connection-string in ANY profile, which turns
  #     Dev Services off. See the %prod block (fail-fast) and .env.example.
  # Setting the env var (e.g. in an IDE run config) also switches dev to a real
  # Mongo instead of Dev Services.
  mongodb:
    database: service_policy

  # ─── Logging ───────────────────────────────────────────────
  # Default: JSON structured logs to stdout (12-factor compliant).
  # Overridden in %dev profile to be human-readable.
  log:
    level: INFO
    category:
      "io.github.ricardoqmd.servicepolicy":
        level: DEBUG
    console:
      json:
        pretty-print: false
        date-format: "yyyy-MM-dd'T'HH:mm:ss.SSSXXX"

  # ─── Health checks ─────────────────────────────────────────
  # Quarkus automatically exposes:
  #   GET /q/health         → liveness + readiness combined
  #   GET /q/health/live    → liveness  (am I alive?)
  #   GET /q/health/ready   → readiness (can I receive traffic?)
  smallrye-health:
    root-path: /q/health

  # ─── Metrics ───────────────────────────────────────────────
  # Prometheus-format metrics exposed at /q/metrics.
  micrometer:
    export:
      prometheus:
        path: /q/metrics
    binder:
      http-server:
        enabled: true
      http-client:
        enabled: true
      jvm: true
      system: true

  # ─── OpenAPI / Swagger UI ──────────────────────────────────
  # The generated spec is NOT versioned (ADR-015): it is served at /q/openapi and
  # written to the build output — never persisted into the repo (no
  # store-schema-directory), which is what used to capture env-specific values.
  swagger-ui:
    always-include: true
    path: /q/swagger-ui
  smallrye-openapi:
    path: /q/openapi
    info-title: "Service Policy — PDP"
    info-version: "1.0.0"

# ─────────────────────────────────────────────────────────────
# Service Policy custom configuration (typed via ServicePolicyConfig)
# ─────────────────────────────────────────────────────────────
service-policy:
  info:
    name: "Service Policy"
    description: "Open source ABAC Policy Decision Point"
    repository: "https://github.com/ricardoqmd/service-policy"
  # Authorization markers (ADR-013). mode: role | scope.
  # Override role/scope names via env vars, e.g. SERVICE_POLICY_AUTHZ_ADMIN_ROLE=my-admin.
  authz:
    admin:
      mode: role
      role: authz-admin
    delegation:
      mode: role
      role: pdp-client

# ═════════════════════════════════════════════════════════════
# Profile: dev  (active when running `./mvnw quarkus:dev`)
# ═════════════════════════════════════════════════════════════
"%dev":
  quarkus:
    oidc:
      # Disabled by default in dev so you can iterate without a running IdP.
      # To exercise the R013 security base locally against Keycloak 26, set in .env:
      #   QUARKUS_OIDC_ENABLED=true
      #   QUARKUS_OIDC_AUTH_SERVER_URL=https://<kc-host>/realms/<realm>
      # (env vars override this value; ordinal 300 > yaml 255).
      enabled: false
    log:
      level: DEBUG
      # Human-readable plain-text logs in dev (override JSON default).
      console:
        format: "%d{HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %s%e%n"

# ═════════════════════════════════════════════════════════════
# Profile: test  (active during `./mvnw test`)
# ═════════════════════════════════════════════════════════════
"%test":
  quarkus:
    oidc:
      # Disabled in tests: @TestSecurity from quarkus-test-security supplies the
      # security identity and JWT claims without a real OIDC server.
      enabled: false
    log:
      level: WARN
      category:
        "io.github.ricardoqmd.servicepolicy":
          level: INFO
      console:
        format: "%d{HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %s%e%n"

# ═════════════════════════════════════════════════════════════
# Profile: prod  (default when running the packaged jar)
# ═════════════════════════════════════════════════════════════
"%prod":
  quarkus:
    # MongoDB connection is REQUIRED in prod and has no default: if
    # QUARKUS_MONGODB_CONNECTION_STRING is not injected, the app fails fast at
    # startup instead of silently trying to reach a wrong Mongo.
    #   e.g. mongodb://<user>:<pass>@<mongo-host>:27017/?authSource=admin
    mongodb:
      connection-string: ${QUARKUS_MONGODB_CONNECTION_STRING}
    log:
      level: INFO
    # Swagger UI disabled in production for security
    # (prevents attackers from probing endpoint schemas).
    swagger-ui:
      always-include: false